name: Commit Larper

on:
  schedule:
    - cron: '0 10,16,22 * * *'
  workflow_dispatch:

jobs:
  larp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Make a fake commit
        run: |
          echo "$(date -u)" >> activity.log
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add .
          git commit -m "chore: activity update $(date -u '+%Y-%m-%d %H:%M')"
          git push
