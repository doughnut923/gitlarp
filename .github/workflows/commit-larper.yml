name: Commit Larper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  larp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Random gate and delay
        run: |
          ROLL=$((RANDOM % 100))
          if [ "$ROLL" -gt 25 ]; then
            echo "Skipping (roll=$ROLL)"
            exit 0
          fi
          SLEEP=$((RANDOM % 3300))
          echo "Sleeping ${SLEEP}s then committing (roll=$ROLL)"
          sleep "$SLEEP"
      - name: Make a fake commit
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          echo "$(date -u)" > activity.log
          git add .
          git commit -m "$(shuf -n 1 commit-messages.txt)"
          git push
