name: Commit Larper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  larp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Random gate and delay
        run: |
          ROLL=$((RANDOM % 100))
          if [ "$ROLL" -gt 25 ]; then
            echo "Skipping (roll=$ROLL)"
            exit 0
          fi
          SLEEP=$((RANDOM % 3300))
          echo "Sleeping ${SLEEP}s then committing (roll=$ROLL)"
          sleep "$SLEEP"
      - name: Make a fake commit
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          MESSAGE="$(shuf -n 1 commit-messages.txt)"
          if [ ! -f activity.log ] || [ "$((RANDOM % 10))" -lt 3 ]; then
            echo "$(date -u)" >> activity.log
            echo "→ added line"
          else
            sed -i '1d' activity.log
            echo "→ removed first line"
          fi
          git add .
          git commit -m "$MESSAGE"
          git push
